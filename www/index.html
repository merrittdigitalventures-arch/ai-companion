<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #video-container { flex: 1; position: relative; background: #111; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .status { background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; font-size: 12px; border: 1px solid #444; }
        .btn { background: #ff3b30; color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; font-size: 18px; box-shadow: 0 4px 15px rgba(255,59,48,0.3); }
        .btn:active { transform: scale(0.95); background: #d32f2f; }
    </style>
</head>
<body>
    <div id="video-container">
        <video id="simliVideo" autoplay playsinline></video>
        <div class="controls">
            <div id="st" class="status">VIRTUAL COMPANION IDLE</div>
            <button id="mainBtn" class="btn">START CALL</button>
        </div>
    </div>

    <script src="https://unpkg.com/simli-client/dist/index.min.js"></script>
    <script src="personas.js"></script>
    <script>
        const simliClient = new SimliClient();
        const btn = document.getElementById('mainBtn');
        const st = document.getElementById('st');
        const videoEl = document.getElementById('simliVideo');
        
        let active = false;
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.continuous = true;

        // INTERRUPTION LOGIC: If user speaks, stop AI immediately
        rec.onspeechstart = () => {
            if (active) {
                console.log("Interruption detected...");
                // simliClient.interrupt(); // Stops current audio/video buffer
            }
        };

        async function initSimli() {
            await simliClient.Initialize({
                apiKey: "YOUR_SIMLI_API_KEY", // Get from simli.com
                faceID: COMPANIONS.Luna.faceId,
                handleSilence: true,
                videoRef: videoEl
            });
            await simliClient.start();
        }

        btn.onclick = async () => {
            if (!active) {
                st.innerText = "CONNECTING...";
                await initSimli();
                rec.start();
                active = true;
                btn.innerText = "END CALL";
                st.innerText = "LISTENING...";
            } else {
                location.reload();
            }
        };

        rec.onresult = async (e) => {
            const text = e.results[e.results.length - 1][0].transcript;
            st.innerText = "THINKING...";
            
            // 1. Send to Groq Backend (via your Termux server)
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: text, persona: 'Luna' })
            });
            const data = await res.json();

            // 2. Simli handles the Lip-Sync automatically
            // simliClient.sendTextToAvatar(data.text);
            st.innerText = "LUNA SPEAKING...";
        };
    </script>
</body>
</html>
